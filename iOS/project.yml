name: Cartcount
options:
  bundleIdPrefix: com.shimondeitel.grocerylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cartcount:
    type: application
    platform: iOS
    sources:
      - path: Cartcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grocerylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cartcount/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CartcountTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CartcountTests
      - path: Cartcount.storekit
    dependencies:
      - target: Cartcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grocerylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CartcountUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CartcountUITests
    dependencies:
      - target: Cartcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.grocerylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cartcount:
    build:
      targets:
        Cartcount: all
        CartcountTests: [test]
        CartcountUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Cartcount.storekit
    test:
      config: Debug
      storeKitConfiguration: Cartcount.storekit
      targets:
        - CartcountTests
        - CartcountUITests
    archive:
      config: Release
